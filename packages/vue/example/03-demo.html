<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app">
      <div id="case1"></div>
      <div id="case2"></div>
      <div id="case3"></div>
      <div id="case4"></div>
      <div id="case5"></div>
    </div>
    <script type="module">
      // import {
      //   h,
      //   render,
      // } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, render } from '../dist/vue.esm.js';

      const case1 = document.querySelector('#case1');
      const vnode1 = h('div', 'hello world');
      const vnode1_change = h('div', { style: { color: 'red' } }, 'hello world change');

      render(vnode1, case1);
      setTimeout(() => {
        render(vnode1_change, case1);
      }, 1000);

      const case2 = document.querySelector('#case2');
      const vnode2 = h('div', [h('span', 'hello'), h('span', 'world')]);
      render(vnode2, case2);

      // 卸载
      const case3 = document.querySelector('#case3');
      const vnode3 = h('div', 'hello world');
      render(vnode3, case3);
      setTimeout(() => {
        render(null, case3);
      }, 1000);

      // 更新
      const case4 = document.querySelector('#case4');
      const vnode4 = h('div', { style: { color: 'red' } }, 'hello world');
      const vnode4_change = h('div', { style: { color: 'blue' } }, 'hello world change');
      render(vnode4, case4);
      setTimeout(() => {
        render(vnode4_change, case4);
      }, 1000);

      // children 为 null 的情况
      const case5 = document.querySelector('#case5');
      const vnode5 = h('div', { style: { color: 'red' } }, 'hello world');
      const vnode5_change = h('div', { style: { height: '100px', backgroundColor: 'red' } });
      render(vnode5, case5);
      setTimeout(() => {
        render(vnode5_change, case5);
      }, 1000);
    </script>
  </body>
</html>
