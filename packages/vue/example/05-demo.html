<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <div id="case1"></div>
    </div>
    <script type="module">
      // import { h, render } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, render } from '../dist/vue.esm.js';

      // case1: 乱序对比 — c1 => [a,b,c,d,e]; c2 => [a,c,d,b,e]
      // 双端对比完成后：i = 1; e1 = 3; e2 = 3（中间 b,c,d 与 c,d,b 为乱序）
      const case1 = document.querySelector('#case1');
      const vNode1 = h('div', [
        h('p', { key: 'a', style: { color: 'red' } }, 'a'),
        h('p', { key: 'b', style: { color: 'red' } }, 'b'),
        h('p', { key: 'c', style: { color: 'red' } }, 'c'),
        h('p', { key: 'd', style: { color: 'red' } }, 'd'),
        h('p', { key: 'e', style: { color: 'red' } }, 'e'),
      ]);
      const vNode1_change = h('div', [
        h('p', { key: 'a', style: { color: 'blue' } }, 'a'),
        h('p', { key: 'c', style: { color: 'blue' } }, 'c'),
        h('p', { key: 'g', style: { color: 'red' } }, 'g'),
        h('p', { key: 'd', style: { color: 'blue' } }, 'd'),
        h('p', { key: 'b', style: { color: 'blue' } }, 'b'),
        h('p', { key: 'e', style: { color: 'blue' } }, 'e'),
      ]);
      render(vNode1, case1);
      setTimeout(() => {
        render(vNode1_change, case1);
      }, 1500);
    </script>
  </body>
</html>
