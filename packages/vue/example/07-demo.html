<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app">
      <div id="case1"></div>
      <div id="case2"></div>
    </div>
    <script type="module">
      // import { h, Text, render } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, Text, render } from '../dist/vue.esm.js';

      const case1 = document.querySelector('#case1');
      const vnode1 = h(Text, null, 'hello world');
      const vnode1_change = h(Text, null, 'hello world change');
      render(vnode1, case1);
      setTimeout(() => {
        render(vnode1_change, case1);
      }, 1000);

      const case2 = document.querySelector('#case2');
      const vnode2 = h('div', null, ['hello', 'world']);
      const vnode2_change = h('div', null, ['hello', 'world', 'change']); 
      render(vnode2, case2);
      setTimeout(() => {
        render(vnode2_change, case2);
      }, 1000);
    </script>
  </body>
</html>
