<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <button id="btn">count++</button>
    <script type="module">
      // import { h, Text, render } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, createApp, ref } from '../dist/vue.esm.js';

      // 最简单的 setup+render 计数器组件：
      // - setup 里通过 ref 声明响应式的 count
      // - render 里通过 this.count 访问（runtime-core 内部对 ref 做了自动解包）
      const Comp = {
        setup() {
          const count = ref(0);

          btn.onclick = () => {
            count.value++;
          };

          return {
            count,
          };
        },

        render() {
          return h('div', this.count);
        },
      };

      // 挂载带 setup + render 的根组件；render 内通过 this 访问 setup 返回的 ref（已自动解包）
      createApp(Comp, { msg: 'Hi' }).mount(document.getElementById('app'));
    </script>
  </body>
</html>
