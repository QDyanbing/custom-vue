<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <button id="btn">count++</button>
    <script type="module">
      // import { h, createApp, ref } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, createApp, ref } from '../dist/vue.esm.js';

      // 演示组件 props / attrs 的拆分：
      // - 组件只在 props 选项里声明了 msg
      // - 调用 createApp 时额外传入 count
      // 结果：
      // - setup 第一个参数 props 里只有 msg
      // - 第二个参数的 attrs 中可以拿到 count
      const Comp = {
        props: ['msg'],
        setup(props, { attrs }) {
          const count = ref(0);

          return () => {
            return h('div', count.value);
          };
        },
      };

      // 挂载带 setup + render 的根组件；render 内通过 this 访问 setup 返回的 ref（已自动解包）
      createApp(Comp, { msg: 'Hi', count: 0 }).mount(document.getElementById('app'));
    </script>
  </body>
</html>
