<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <button id="btn">count++</button>
    <script type="module">
      // import { h, createApp, ref } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, createApp, ref, nextTick } from '../dist/vue.esm.js';

      // 演示两个点：
      // 1. props / attrs 的拆分
      //   - 组件只在 props 选项里声明了 msg
      //   - createApp 传入 { msg, count } 时：props 里只有 msg；count 会出现在 setupContext.attrs（getter 返回 instance.attrs）
      // 2. `setup` 返回“渲染函数”的情况
      //   - setupResult 为函数时，运行时会把它当作 render 使用
      const Comp = {
        props: ['msg'],
        setup(props, { attrs }) {
          const count = ref(0);

          btn.onclick = () => {
            // 连续同步修改多次：渲染更新会通过 scheduler 在微任务中调度（不会在这段同步代码里立刻渲染）
            count.value++;
            count.value++;
            count.value++;

            // nextTick：等待本轮调度的渲染完成后再读 DOM
            nextTick(() => {
              const box = document.getElementById('box');
              console.log('box.textContent ==> ', box.textContent);
            });
          };

          return function render() {
            console.count('render');

            // $nextTick：与 nextTick 相同的“等待渲染后回调”语义，但 this 绑定为组件实例（便于写成实例方法）
            this.$nextTick(() => {
              const box = document.getElementById('box');
              console.log('box.textContent ==> ', box.textContent);
            });

            return h('div', { id: 'box' }, count.value);
          };
        },
      };

      // 挂载带 setup 的根组件；渲染函数来自 setup 的返回值
      createApp(Comp, { msg: 'Hi', count: 0 }).mount(document.getElementById('app'));
    </script>
  </body>
</html>
