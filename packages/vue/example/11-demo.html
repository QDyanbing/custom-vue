<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <button id="btn">过年了，年龄加一岁</button>
    <script type="module">
      // import { h, createApp, ref } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, createApp, ref, nextTick } from '../dist/vue.esm.js';

      // 演示"父组件更新 → 子组件 props 变化 → 子组件重新渲染"的流程：
      // - 父组件 Comp 持有一个 ref(age)，点击按钮时 age++
      // - 父组件 render 把 age.value 通过 props 传给子组件 Child
      // - 渲染器在 patch 阶段走 updateComponent → shouldUpdateComponent → updateProps
      //   让子组件的 props.age 同步更新，从而触发 Child 的 render effect 重新执行

      // 子组件：接收 age prop，直接在渲染函数中使用
      const Child = {
        props: ['age'],
        setup(props) {
          return () => {
            return h('div', ['我还是个孩子啊，我今年', props.age, '岁']);
          };
        },
      };

      // 父组件：维护 age 状态，通过 props 传递给 Child
      const Comp = {
        setup(props, { attrs }) {
          const age = ref(18);

          btn.onclick = () => {
            age.value++;
          };

          return () => {
            return h(Child, { age: age.value });
          };
        },
      };

      // 挂载带 setup 的根组件；渲染函数来自 setup 的返回值
      createApp(Comp, { msg: 'Hi', count: 0 }).mount(document.getElementById('app'));
    </script>
  </body>
</html>
