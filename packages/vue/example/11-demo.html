<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <button id="btn">过年了，年龄加一岁</button>
    <script type="module">
      // import { h, createApp, ref } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, createApp, ref, nextTick } from '../dist/vue.esm.js';

      const Child = {
        props: ['age'],
        setup(props) {
          return () => {
            return h('div', ['我还是个孩子啊，我今年', props.age, '岁']);
          };
        },
      };

      const Comp = {
        setup(props, { attrs }) {
          const age = ref(18);

          btn.onclick = () => {
            age.value++;
          };

          return () => {
            return h(Child, { age: age.value });
          };
        },
      };

      // 挂载带 setup 的根组件；渲染函数来自 setup 的返回值
      createApp(Comp, { msg: 'Hi', count: 0 }).mount(document.getElementById('app'));
    </script>
  </body>
</html>
