<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>

    <!--
      演示组件事件（emit）：
      - 子组件通过 setup 的第二个参数 { emit } 触发事件
      - 父组件通过 h(Child, { onFoo: handler }) 监听事件
      - emit('foo', 1, 2, 3) 会查找 props 中的 onFoo 并调用
    -->
    <script type="module">
      // import { h, createApp } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, createApp } from '../dist/vue.esm.js';

      // 子组件：渲染一个按钮，点击时通过 emit 触发 'foo' 事件，并传递参数
      const Child = {
        setup(props, { emit }) {
          return () => {
            return h(
              'button',
              {
                onClick: () => {
                  emit('foo', 1, 2, 3);
                },
              },
              'click me',
            );
          };
        },
      };

      // 父组件：渲染 Child，通过 onFoo 监听子组件触发的 'foo' 事件
      const Comp = {
        setup(props, { attrs }) {
          return () => {
            return h(Child, {
              onFoo(a, b, c) {
                console.log('click parent', a, b, c);
              },
            });
          };
        },
      };

      // 挂载带 setup 的根组件；渲染函数来自 setup 的返回值
      createApp(Comp, { msg: 'Hi', count: 0 }).mount(document.getElementById('app'));
    </script>
  </body>
</html>
