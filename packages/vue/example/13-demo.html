<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      // import { h, createApp } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, createApp } from '../dist/vue.esm.js';

      const Child = {
        setup(props, { slots }) {
          return () => {
            return h('div', [slots.default()]);
          };
        },
      };

      const Comp = {
        setup(props, { attrs }) {
          return () => {
            return h('div', [
              h('p', '父组件'),
              // h(Child, null, {
              //   header: () => h('div', '父组件传递的插槽 Header'),
              //   footer: ({ a }) => h('div', '父组件传递的插槽 Footer' + a),
              // }),

              h(Child, null, () => h('div', '父组件传递的默认插槽')),
            ]);
          };
        },
      };

      // 挂载带 setup 的根组件；渲染函数来自 setup 的返回值
      createApp(Comp, { msg: 'Hi', count: 0 }).mount(document.getElementById('app'));
    </script>
  </body>
</html>
