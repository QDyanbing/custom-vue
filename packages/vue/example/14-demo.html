<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- 演示 getCurrentInstance：在 setup 中获取当前组件实例 -->
    <script type="module">
      // import { h, createApp } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, createApp, getCurrentInstance } from '../dist/vue.esm.js';

      const Comp = {
        setup() {
          const vm = getCurrentInstance();

          console.log(vm);

          return () => {
            return h('div', [h('p', '父组件')]);
          };
        },
      };

      createApp(Comp, { msg: 'Hi' }).mount(document.getElementById('app'));
    </script>
  </body>
</html>
