<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      // import { h, createApp } from '/node_modules/vue/dist/vue.esm-browser.js';
      import {
        h,
        ref,
        createApp,
        getCurrentInstance,
        onBeforeMount,
        onMounted,
        onBeforeUpdate,
        onUpdated,
        onBeforeUnmount,
        onUnmounted,
      } from '../dist/vue.esm.js';

      const Child = {
        props: ['count'],
        setup(props) {
          onBeforeMount(() => {
            console.log('子组件：before mount');
          });
          onMounted(() => {
            console.log('子组件：mounted');
          });

          onBeforeUpdate(() => {
            console.log('子组件：before update');
          });
          onUpdated(() => {
            console.log('子组件：updated');
          });
          onBeforeUnmount(() => {
            console.log('子组件：before unmount');
          });
          onUnmounted(() => {
            console.log('子组件：unmounted');
          });

          return () => h('div', ['子组件', props.count]);
        },
      };

      const Comp = {
        setup() {
          const count = ref(0);

          onBeforeMount(() => {
            console.log('父组件：before mount');
          });
          onMounted(() => {
            console.log('父组件：getCurrentInstance', getCurrentInstance());
            console.log('父组件：mounted');
          });

          setTimeout(() => {
            count.value++;
          }, 1000);

          onBeforeUpdate(() => {
            console.log('父组件：before update');
          });
          onUpdated(() => {
            console.log('父组件：updated');
          });
          onBeforeUnmount(() => {
            console.log('父组件：before unmount');
          });
          onUnmounted(() => {
            console.log('父组件：unmounted');
          });
          return () => h('div', [h('p', '父组件'), h(Child, { count: count.value })]);
        },
      };
      const app = createApp(Comp, { msg: 'Hi' });
      app.mount(document.getElementById('app'));
      setTimeout(() => {
        app.unmount();
      }, 2000);
    </script>
  </body>
</html>
