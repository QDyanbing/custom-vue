<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>

  <body>
    <div id="app"></div>
    <script type="module">
      // import { h, createApp } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, createApp, getCurrentInstance, onMounted } from '../dist/vue.esm.js';

      const Comp = {
        setup() {
          onMounted(() => {
            console.log('mounted');

          return () => {

      };

      createApp(Comp, { msg: 'Hi' }).mount(document.getElementById('app'));
