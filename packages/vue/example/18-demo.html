<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      // import { h, ref, createApp } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, ref, createApp } from '../dist/vue.esm.js';

      function App() {
        return h('div', 'Hello World');
      }

      const app = createApp(App);
      app.mount(document.getElementById('app'));
    </script>
  </body>
</html>
