<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <!--
      演示 Teleport 的动态目标容器：
      - 父组件把 Teleport 的 `to` 写成响应式 ref，初始为 `body`
      - 1s 后更新 `to` 为 `#app`，Teleport 的子内容会从旧目标迁移到新目标
    -->
    <script type="module">
      // import { h, ref, createApp, Teleport } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, ref, createApp, Teleport } from '../dist/vue.esm.js';

      const Child = {
        setup() {
          return () => h('div', ['子组件']);
        },
      };

      const Comp = {
        setup() {
          const count = ref(0);
          const to = ref('body');

          setTimeout(() => {
            to.value = '#app';
          }, 1000);

          return () =>
            h('div', [
              h('p', { id: 'box' }, '父组件'),
              h(
                Teleport,
                { to: to.value, },
                h('div', ['我是Teleport的子内容', count.value]),
              ),
            ]);
        },
      };

      const app = createApp(Comp);
      app.mount(document.getElementById('app'));
    </script>
  </body>
</html>
