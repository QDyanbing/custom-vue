<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <!--
      演示 KeepAlive：
      - 父组件用按钮在 Child1 / Child2 之间切换默认插槽里的动态组件
      - 被切换走的组件不会走常规 unmount（DOM 移到 KeepAlive 内部容器）；再切回来时复用实例与 DOM，onMounted 只在首次进入时打印
    -->
    <script type="module">
      // import {
      //   h,
      //   ref,
      //   createApp,
      //   KeepAlive,
      //   onMounted,
      //   onUnmounted,
      // } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, ref, createApp, KeepAlive, onMounted, onUnmounted } from '../dist/vue.esm.js';

      const Child1 = {
        name: 'Child1',
        setup() {
          onMounted(() => {
            console.log('Child1 mounted');
          });

          onUnmounted(() => {
            console.log('Child1 unmounted');
          });

          return () => h('div', ['子组件1', h('input')]);
        },
      };

      const Child2 = {
        name: 'Child2',
        setup() {
          onMounted(() => {
            console.log('Child2 mounted');
          });

          onUnmounted(() => {
            console.log('Child2 unmounted');
          });

          return () => h('div', ['子组件2', h('input')]);
        },
      };

      const Child3 = {
        name: 'Child3',
        setup() {
          onMounted(() => {
            console.log('Child3 mounted');
          });

          onUnmounted(() => {
            console.log('Child3 unmounted');
          });

          return () => h('div', ['子组件3', h('input')]);
        },
      };

      const Comp = {
        name: 'Comp',
        setup() {
          const components = [Child1, Child2, Child3];
          const index = ref(0);

          function onClick() {
            index.value = (index.value + 1) % components.length;
          }

          return () =>
            h('div', [
              h('button', { onClick }, '切换组件'),
              h(KeepAlive, { max: 2 }, () => h(components[index.value])),
            ]);
        },
      };

      const app = createApp(Comp);
      app.mount(document.getElementById('app'));
    </script>
  </body>
</html>
