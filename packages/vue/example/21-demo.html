<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>

    <style>
      .v-enter-active,
      .v-leave-active {
        transition: all 0.5s ease;
      }

      .v-enter-from,
      .v-leave-to {
        transform: translateX(100px);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!--
      演示 Transition：
      - 用按钮切换默认插槽里单个元素子节点（p）的显隐
      - 进入/离开时由 Transition 写入的 vnode.transition 驱动 mountElement / unmount 中的 class 与钩子；样式见上方 .v-enter-* / .v-leave-*
    -->
    <script type="module">
      // import { h, ref, createApp, Transition } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, ref, createApp, Transition } from '../dist/vue.esm.js';

      const App = {
        name: 'App',
        setup() {
          const show = ref(true);

          function onClick() {
            show.value = !show.value;
          }

          return () =>
            h('div', [
              h('button', { onClick }, '切换'),
              h(
                Transition,
                {
                  onBeforeEnter: el => {
                    console.log('before enter');
                  },
                  onEnter: el => {
                    console.log(el);
                  },
                  onLeave: el => {
                    console.log('leave');
                  },
                },
                () => (show.value ? h('p', 'hello world') : undefined),
              ),
            ]);
        },
      };

      const app = createApp(App);
      app.mount(document.getElementById('app'));
    </script>
  </body>
</html>
