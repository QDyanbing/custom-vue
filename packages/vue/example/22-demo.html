<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <!--
      演示 defineAsyncComponent：
      - loader 返回 Promise，1s 后 resolve 一个真正的组件定义
      - 在等待期间先渲染 loadingComponent；若超时或 reject，则切到 errorComponent
      - 外层传给异步组件的 props，会在真实组件加载完成后继续透传
    -->
    <script type="module">
      // import {
      //   h,
      //   ref,
      //   createApp,
      //   defineAsyncComponent,
      // } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, ref, createApp, defineAsyncComponent } from '../dist/vue.esm.js';

      const App = {
        name: 'App',
        setup() {
          const component = defineAsyncComponent({
            loader: () => {
              // return import('./js/asyncComponent.js');

              return new Promise((resolve, reject) => {
                setTimeout(() => {
                  // 这里直接返回组件对象，便于观察 loading -> resolved 的切换过程。
                  resolve({
                    props: ['msg'],
                    setup(props) {
                      return () => {
                        return h('div', `${props.msg} 123`);
                      };
                    },
                  });
                }, 1000);
              });
            },
            // timeout 大于 loader 的耗时，所以当前示例会走成功分支。
            timeout: 2000,
            loadingComponent: {
              render() {
                return h('div', 'loading...');
              },
            },
            errorComponent: {
              render() {
                return h('div', 'error...');
              },
            },
          });

          return () => {
            return h(component, { msg: 'hello world' });
          };
        },
      };

      const app = createApp(App);
      app.mount(document.getElementById('app'));
    </script>
  </body>
</html>
