<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <!--
      演示 Fragment 根节点 + 响应式更新 + 应用卸载：
      - 根渲染函数返回 h(Fragment, null, [...])，多个兄弟节点直接挂到 #app 下（片段不产生包裹元素）
      - 1s 后 count++，子节点走 patchChildren 更新文案
      - 2s 后 app.unmount()，片段类型在 unmount 中只卸载 children，不 hostRemove 片段自身
    -->
    <script type="module">
      // import { h, ref, createApp, Fragment } from '/node_modules/vue/dist/vue.esm-browser.js';
      import { h, ref, createApp, Fragment } from '../dist/vue.esm.js';

      const App = {
        name: 'App',
        setup() {
          const count = ref(0);

          setTimeout(() => {
            count.value++;
          }, 1000);

          return () => {
            return h(Fragment, null, [
              h('div', { style: { color: 'red' } }, 'hello '),
              h('div', { style: { color: 'blue' } }, `world ${count.value}`),
            ]);
          };
        },
      };

      const app = createApp(App);
      app.mount(document.getElementById('app'));

      setTimeout(() => {
        app.unmount();
      }, 2000);
    </script>
  </body>
</html>
