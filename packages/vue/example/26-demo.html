<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <style>
      #app {
        padding: 100px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!--
      演示 Fragment + renderList 的稳定片段更新：
      - 列表项通过 createVNode('div', { key: item }, toDisplayString(item), 1) 创建，patchFlag=1 标记动态文本
      - 外层 Fragment 使用 patchFlag=128（STABLE_FRAGMENT），更新时可走 processFragment 的动态子节点快路径
      - 1s 后 list 从 ['a', 'b', 'c'] 变为 ['b', 'a']，可观察列表重排和节点复用
    -->
    <script type="module">
      // import {
      //   ref,
      //   createApp,
      //   createVNode,
      //   openBlock,
      //   createElementBlock,
      // } from '/node_modules/vue/dist/vue.esm-browser.js';
      import {
        ref,
        createApp,
        createVNode,
        openBlock,
        createElementBlock,
        Fragment,
        toDisplayString,
        renderList,
      } from '../dist/vue.esm.js';

      const App = {
        setup() {
          const list = ref(['a', 'b', 'c']);

          setTimeout(() => {
            list.value = ['b', 'a'];
          }, 1000);

          return () => {
            openBlock();

            const vnode = createElementBlock('div', null, [
              (openBlock(),
              createElementBlock(
                Fragment,
                null,
                renderList(list.value, item => {
                  return createVNode('div', { key: item }, toDisplayString(item), 1);
                }),
                128,
              )),
            ]);

            console.log(vnode);

            return vnode;
          };
        },
      };

      const app = createApp(App);
      app.mount('#app');
    </script>
  </body>
</html>
